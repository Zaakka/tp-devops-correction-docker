name: CI devops 2025
on:
  push:
    branches:
      - main
      - develop
  pull_request:
jobs:
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and test with Maven
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=Zaakka_tp-devops-correction-docker -Dsonar.organization=zaakka -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} --file ./simple-api/pom.xml

  build-and-push-docker-image:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: ${{ github.ref == 'refs/heads/main' }}
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ github.ref == 'refs/heads/main' }}
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: ${{ github.ref == 'refs/heads/main' }}
      - name: Build image and push front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-front:latest
          push: ${{ github.ref == 'refs/heads/main' }}

  deploy:
    needs: build-and-push-docker-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: confirmation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create SSH directory
        run: mkdir -p ~/.ssh
      - name: Write SSH key
        run: printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
      - name: Set SSH key permissions
        run: chmod 600 ~/.ssh/id_rsa
      - name: Verify SSH key
        run: head -1 ~/.ssh/id_rsa
      - name: Add known hosts
        run: ssh-keyscan -t ed25519 -T 10 zakaria.chaouch.takima.school >> ~/.ssh/known_hosts || true
      - name: Test SSH connection
        run: ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa admin@zakaria.chaouch.takima.school echo "SSH OK"
      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible
      - name: Create vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
      - name: Deploy with Ansible
        run: ansible-playbook -i ansible/inventories/setup.yml ansible/playbook.yml --vault-password-file .vault_pass
      - name: Cleanup vault password
        if: always()
        run: rm -f .vault_pass

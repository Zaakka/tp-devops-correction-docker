---
# tasks file for roles/app
- name: Run backend-blue
  community.docker.docker_container:
    name: backend-blue
    image: "{{ dockerhub_username }}/tp-devops-simple-api:latest"
    pull: true
    state: started
    restart_policy: always
    env:
      DATABASE_HOST: "database"
      DATABASE_PASSWORD: "{{ db_password }}"
    networks:
      - name: my-network
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python3

- name: Run backend-green
  community.docker.docker_container:
    name: backend-green
    image: "{{ dockerhub_username }}/tp-devops-simple-api:latest"
    pull: true
    state: started
    restart_policy: always
    env:
      DATABASE_HOST: "database"
      DATABASE_PASSWORD: "{{ db_password }}"
    networks:
      - name: my-network
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python3

---
# tasks file for roles/front
- name: Run front
  community.docker.docker_container:
    name: front
    image: kazaaaa/tp-devops-front:latest
    pull: true
    state: started
    restart_policy: always
    networks:
      - name: my-network
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python3
